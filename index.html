<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-wrapper">
        <div class="chat-container">
            <header class="chat-header">
                <div class="header-content">
                    <div class="bot-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="header-info">
                        <h1>AI Assistant</h1>
                        <span class="status-indicator">
                            <span class="status-dot"></span>
                            Online
                        </span>
                    </div>
                    <div class="header-actions">
                        <button class="action-btn" id="clearChatBtn" title="Clear Chat">
                            <i class="fas fa-trash"></i>
                        </button>
                        <button class="action-btn" id="themeToggle" title="Toggle Theme">
                            <i class="fas fa-moon"></i>
                        </button>
                    </div>
                </div>
            </header>

            <main class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <div class="bot-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <p>Hello! I'm your AI assistant. How can I help you today?</p>
                    </div>
                </div>
            </main>

            <footer class="chat-input-container">
                <div class="input-wrapper">
                    <button class="attachment-btn" id="attachmentBtn" title="Attach File">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <textarea id="messageInput" placeholder="Type your message..." rows="1" maxlength="2000"></textarea>
                    <div class="input-actions">
                        <button class="mic-btn" id="micBtn" title="Voice Input">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <button class="send-btn" id="sendBtn" title="Send Message">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
                <div class="typing-indicator" id="typingIndicator">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>
            </footer>
        </div>

        <footer class="footer">
            <div class="footer-content">
                <span class="footer-heart">❤️</span>
                <p class="footer-text">Made with <span class="highlight">PRINCE RAJ</span></p>
                <span class="footer-heart">❤️</span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
